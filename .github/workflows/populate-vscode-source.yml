name: Populate VS Code Source

on:
  workflow_dispatch:

jobs:
  populate:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: brew install jq git-lfs && git lfs install

      - name: Clone VS Code source via get_repo.sh
        run: bash get_repo.sh
        env:
          CI_BUILD: "no"
          VSCODE_QUALITY: stable
          VSCODE_LATEST: "yes"

      - name: Commit VS Code source to fork
        run: |
          cd vscode
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove vscode's own .git so it becomes part of our repo
          rm -rf .git

          cd ..
          # Add the vscode directory to our fork (force — bypasses .gitignore)
          git add -f vscode/
          git commit -m "feat: add full VS Code source for direct editing

          Generated by get_repo.sh with VSCodium patches applied.
          This allows direct editing of walkthrough, layout, menus, etc."
          git push origin HEAD
